schema_version: 1

execution:
  mode: "direct"
  continue_without_confirmation: true
  automatic_correction_cycle: true

editing:
  existing_files:
    temporary_copy_required: true
    diff_required: true
  new_files:
    full_content_review_required: true

roles:
  local:
    name: "IA local"
    responsibilities:
      - execute_commands
      - edit_within_scope
      - validate
      - apply_corrections
      - update_status

  auditor:
    name: "IA auditora"
    responsibilities:
      - inspect_return
      - verify_diffs
      - verify_validations
      - approve_or_reject
      - update_status

  remote_author:
    name: "IA autora remota"
    responsibilities:
      - inspect_project
      - implement_changes
      - validate
      - update_status

stages:
  format: "X.Y.Z"
  meaning:
    X: "macroetapa"
    Y: "atividade"
    Z: "patch"
  initial_patch: 0
  rules:
    - "A primeira execução da atividade usa patch 0."
    - "A correção incrementa somente o patch."
    - "Executor e auditor usam o mesmo número para o mesmo retorno."
    - "Após aprovação, a próxima atividade começa com patch 0."

return_version:
  must_be_last_line: true

  templates:
    local: "Versão do retorno da IA local: {stage} — {title}"
    auditor: "Versão do retorno da IA auditora: {stage} — {title}"
    remote_author: "Versão do retorno da IA autora remota: {stage} — {title}"

  examples:
    local: "Versão do retorno da IA local: 7.6.5 — Retorno do gerador simplificado de metadata dos quatro pilotos"
    auditor: "Versão do retorno da IA auditora: 7.6.5 — Auditoria do gerador simplificado de metadata dos quatro pilotos"

states:
  - IN_PROGRESS
  - EXECUTED
  - CORRECTED
  - APPROVED
  - REJECTED
  - BLOCKED
  - COMPLETED
