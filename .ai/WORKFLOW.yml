schema_version: 2

authority:
  canonical_source: ".ai/WORKFLOW.yml"
  applies_to: "qualquer agente, modelo, fornecedor, editor, extensão, sistema operacional ou ferramenta"
  supporting_files:
    project_context: ".ai/PROJECT.yml"
    optional_task_state: ".ai/tasks/<task-id>/STATUS.yml"
  precedence:
    - "instruções explícitas do usuário"
    - "AGENTS.md aplicável ao caminho"
    - ".ai/WORKFLOW.yml"
    - ".ai/PROJECT.yml"
  rule: "Arquivos de tarefa registram estado e evidência; não definem regras operacionais."

startup:
  read:
    - "AGENTS.md aplicável"
    - ".ai/PROJECT.yml"
    - ".ai/WORKFLOW.yml integralmente"
    - "STATUS.yml da tarefa, somente quando existir"
  inspect_git:
    - "branch e upstream"
    - "status, alterações staged e unstaged"
    - "arquivos não versionados"
    - "branches, worktrees e stashes existentes"
  preservation:
    - "Trabalho preexistente pertence ao usuário até prova em contrário."
    - "Não sobrescreva, mova, descarte, inclua em commit ou esconda trabalho fora do escopo."
    - "Use branch ou worktree separado quando o checkout atual contiver trabalho não relacionado."

task_state:
  create_only_when:
    - "o estado precisa atravessar sessões, ambientes ou pessoas"
    - "há execução longa, bloqueio externo ou retomada posterior"
    - "o usuário ou processo do projeto exige rastreabilidade persistente"
  do_not_create_for:
    - "tarefas rotineiras concluídas na mesma sessão"
    - "substituir commit, PR, logs de teste ou descrição do PR"
    - "representar papéis, turnos, handoffs ou aprovações intermediárias"
  template: ".ai/templates/TASK_STATUS.yml"
  history: "Registros concluídos são evidência histórica e não devem ser reescritos para acompanhar mudanças posteriores do workflow."

execution:
  mode: "autonomous"
  agent_model: "single_agent"
  routine_flow:
    - "branch"
    - "implementação"
    - "testes aplicáveis"
    - "revisão do diff completo"
    - "commit"
    - "push"
    - "pull request"
    - "merge"
  allowed_without_repeated_confirmation:
    - "inspecionar arquivos, histórico e estado"
    - "implementar e corrigir somente dentro do escopo autorizado"
    - "executar validações aplicáveis e repetir após correções"
    - "revisar o diff completo"
    - "criar feature branch, commit, push e pull request"
    - "fazer merge rotineiro quando todos os gates de merge rotineiro forem satisfeitos"
  correction_cycle:
    - "identificar falha dentro do escopo"
    - "corrigir"
    - "reexecutar a validação afetada"
    - "revisar o novo diff"
    - "continuar sem pedir aprovação intermediária"

git:
  branch:
    - "Atualize a referência remota da branch principal antes de criar a feature branch."
    - "Nunca edite diretamente a branch principal."
    - "Baseie a feature branch na branch principal remota atualizada."
    - "Preserve branches, worktrees, stashes e arquivos não versionados existentes."
  commit:
    - "Inclua somente arquivos do escopo."
    - "Use mensagem objetiva que descreva a mudança."
  push:
    - "Publique somente a feature branch."
    - "Nunca use force-push."
  pull_request:
    - "Descreva mudanças, motivação, impacto e validações realmente executadas."
    - "Use draft enquanto houver trabalho, validação ou decisão pendente."
    - "Não declare o PR pronto se houver comentários acionáveis ou conflitos pendentes."

validation:
  rules:
    - "Execute somente validações aplicáveis ao escopo, priorizando as definidas em .ai/PROJECT.yml."
    - "Resultados de testes e comandos só podem ser declarados quando realmente executados."
    - "Registre falhas e indisponibilidades com o motivo real; nunca converta ausência de evidência em sucesso."
    - "Revise o diff completo após a última correção."
  governance_changes:
    - "validar sintaxe e estrutura dos arquivos alterados"
    - "detectar chaves YAML duplicadas"
    - "verificar coerência entre instruções, workflow, documentação e templates"
    - "verificar ausência de referências ativas às regras removidas"
    - "confirmar a preservação das proteções de segurança"
    - "executar git diff --check"

merge:
  routine_without_additional_confirmation:
    all_required:
      - "objetivo e escopo satisfeitos"
      - "mudança em feature branch com pull request"
      - "validações relevantes aprovadas"
      - "nenhuma validação indispensável indisponível"
      - "diff completo revisado"
      - "nenhum conflito"
      - "nenhum segredo"
      - "nenhuma mudança fora do escopo"
      - "nenhum comentário acionável pendente"
      - "nenhuma condição sensível presente"
  explicit_human_approval_required:
    any_of:
      - "alteração de dados canônicos, catálogo, taxonomia ou regras de domínio"
      - "manifest ou arquivo gerado sensível"
      - "mudança de governança, segurança, permissões ou controle de acesso"
      - "conflito de merge"
      - "teste falhando ou validação indispensável indisponível"
      - "deploy, produção, publicação externa, custo ou mudança de conta"
      - "decisão visual ou de produto subjetiva"
      - "ação destrutiva, irreversível ou difícil de reverter"
  blocked_action: "Quando qualquer condição sensível estiver presente, prepare o PR e aguarde aprovação humana explícita antes do merge."

safety:
  mandatory:
    no_direct_main_edit: true
    no_preexisting_work_overwrite: true
    no_automatic_stash: true
    no_force_push: true
    no_hard_reset: true
    no_secret_commit_or_report: true
    no_arbitrary_conflict_resolution: true
    corrections_only_in_authorized_scope: true
    report_only_executed_results: true
  destructive_actions:
    - "Resolva alvos exatos com verificações somente leitura."
    - "Prefira operações reversíveis."
    - "Exija aprovação humana explícita antes de executar."
  conflicts:
    - "Não escolha arbitrariamente um lado."
    - "Interrompa o merge e solicite decisão humana com o contexto necessário."

portability:
  principles:
    - "Descreva capacidades e resultados, não marcas ou interfaces específicas."
    - "Use as ferramentas disponíveis no ambiente sem tornar uma ferramenta requisito de governança."
    - "Respeite o shell, o sistema operacional e as convenções detectadas."
    - "Não presuma acesso de rede, interface gráfica, runtime, editor ou serviço."

completion:
  routine: "Conclua o fluxo até o merge quando todos os gates rotineiros forem satisfeitos."
  sensitive: "Conclua implementação, validação, commit, push e PR; pare antes do merge e solicite aprovação humana explícita."
  report:
    - "trabalho realizado"
    - "arquivos alterados"
    - "validações e resultados"
    - "bloqueios reais"
    - "próximo passo humano, somente quando necessário"
