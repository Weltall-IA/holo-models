  summary:
    - "Cada modelo passa a ser executado em subprocesso independente; falhas CUDA não contaminam o processo seguinte."
    - "gte_multilingual_base foi desativado após falha CUDA reproduzida no código remoto e por não ser prioridade PT-BR."
    - "embeddinggemma foi desativado por acesso gated indisponível; Colibri cobre a família com foco específico em PT-BR."
    - "Colibri PT-BR e Multilingual E5 Large Instruct foram adicionados ao conjunto obrigatório."
    - "Qwen3 Embedding 0.6B e BGE-M3 permanecem obrigatórios."
    - "Voyage Nano e os dois BitNet são opcionais; falhas opcionais são registradas sem invalidar resultados obrigatórios completos."
    - "BitNet 270M e 0.6B usam llama-server em modo embedding e arquivos GGUF específicos."
    - "O runner diferencia modelos obrigatórios e opcionais e mantém bloqueio para seleção parcial ou corpus recortado."

