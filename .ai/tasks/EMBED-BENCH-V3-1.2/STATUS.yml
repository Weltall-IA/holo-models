    - "Validação sintática dos arquivos JSON de modelos, prompts e manifesto."
    - "Revisão do fluxo de subprocessos e da continuidade após retorno não zero do worker."
  passed:
    - "Compilação sem erros."
    - "15 de 15 testes direcionados aprovados."
    - "Modelos GGUF exigem arquivo explícito e não exigem dimensão previamente conhecida."
    - "Falha opcional não promove execução parcial nem bloqueia conjunto obrigatório completo."
    - "Falha obrigatória mantém Gate 2 como PARTIAL ou BLOCKED."
    - "E5 e Qwen3 recebem instruções de consulta; Colibri usa encode_query e encode_document do próprio modelo."
