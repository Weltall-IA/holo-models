schema_version: 1

task:
  id: "EMBED-BENCH-V3-1.2"
  title: "Benchmark de embeddings e reranking — Gate 2"
  objective: "Executar e comparar os modelos locais compactos no corpus congelado, priorizando candidatos específicos para PT-BR e baselines multilíngues, com falhas isoladas e resultados reproduzíveis."

scope:
  included:
    - "Gate 2 com modelos obrigatórios selecionados para comparação em PT-BR e benchmark local."
    - "Colibri PT-BR, Multilingual E5 Large Instruct, Qwen3 Embedding 0.6B e BGE-M3 denso como conjunto obrigatório."
    - "Voyage Nano e dois BitNet como candidatos opcionais que devem ser realmente diagnosticados e, quando tecnicamente compatíveis, executados."
    - "BitNet executado por llama.cpp usando arquivos GGUF específicos."
    - "Processo isolado por modelo para impedir corrupção CUDA em cascata."
    - "Revisão, licença, tamanho, acesso, backend, dimensão, dtype, throughput, VRAM e hashes."
    - "Python 3.12, CUDA e llama.cpp local quando disponível."
  excluded:
    - "Gates 3 a 6."
    - "API paga da Voyage AI."
    - "Reranking."
    - "Regeneração do corpus congelado."
    - "Merge, deploy ou publicação de modelos."

execution:
  stage: "1.2.2"
  role: "remote_author"
  state: "CORRECTED"

return:
  title: "Correção da captura de falhas dos modelos opcionais do Gate 2"

changes:
  files_changed:
    - "benchmark/embedding-v3/holo_benchmark/gate2.py"
    - "benchmark/embedding-v3/tests/test_gate2.py"
    - ".ai/tasks/EMBED-BENCH-V3-1.2/STATUS.yml"
  summary:
    - "O resultado obrigatório do Gate 2 foi auditado: 4/4 modelos obrigatórios concluíram no corpus completo e o hash congelado foi preservado."
    - "BGE-M3 foi o melhor modelo nas métricas principais publicadas: HitRate@1, HitRate@10, MRR@10, nDCG@10 e menor taxa de erro de negativos difíceis."
    - "A afirmação anterior de que o Colibri superou o BGE-M3 em MRR e nDCG foi identificada como incorreta e não deve ser repetida."
    - "O parent runner descartava o JSON de erro estruturado sempre que o worker retornava código 2, registrando apenas WorkerProcessError genérico."
    - "A captura foi corrigida para ler primeiro o resultado estruturado, preservar tipo, mensagem e traceback reais, e somente usar erro genérico quando o arquivo de saída não existir."
    - "Timeout, saída inválida e inconsistência entre status ok e exit code não zero agora têm erros próprios."
    - "Execuções com --models agora gravam diagnóstico separado em results/gate2/diagnostics e restauram gate_status.json, GATE_2_REPORT.md, download_manifest.resolved.json e summary.json canônicos."
    - "Os quatro resultados obrigatórios aprovados devem ser preservados; a próxima execução será restrita aos três opcionais."

validations:
  executed:
    - "Inspeção do commit local 8704444f5faf7fc4d229c988e4060ef74be44f8c e de seus nove arquivos alterados."
    - "Conferência de GATE_2_REPORT.md, gate_status.json, summary.json e resultados individuais dos quatro modelos obrigatórios."
    - "Comparação das métricas publicadas entre Colibri, E5, Qwen3 e BGE-M3."
    - "Revisão do fluxo entre gate2_runtime.py e gate2_worker.py."
    - "Compilação isolada do shim corrigido e dos testes novos."
    - "Teste direcionado da preservação do payload de erro com exit code 2."
    - "Teste direcionado da preservação dos artefatos canônicos durante execução parcial com --models."
  passed:
    - "Gate 0 e Gate 1 permanecem PASS."
    - "Gate 2 obrigatório permanece PASS com 600 documentos, 150 consultas e 4/4 modelos obrigatórios concluídos."
    - "Hash do corpus: 8e1b7a6dd6f51d98e1ffe1738b6a59498df24c49b2edca24850b838687dd149b."
    - "Revisões, dimensões, dispositivos CUDA, tempos, VRAM e hashes de pesos estão presentes nos resultados individuais."
    - "Subprocessos impediram falha CUDA em cascata."
    - "2 de 2 testes direcionados do patch 1.2.2 foram aprovados."
    - "O erro real do worker é preservado mesmo quando o processo retorna código 2."
    - "Diagnóstico parcial não substitui nem rebaixa o PASS canônico do Gate 2."
  failed:
    - "As causas reais de voyage4_nano, bitnet_270m e bitnet_06b não foram preservadas pela execução 1.2.1."
  unavailable:
    - "A suíte completa não foi reexecutada pela autora remota."
    - "Os três modelos opcionais dependem de reexecução local para revelar os erros reais e aplicar as correções específicas."

audit:
  findings:
    - "O PASS dos quatro modelos obrigatórios é consistente com os artefatos publicados."
    - "BGE-M3 liderou MRR@10=0.718167 e nDCG@10=0.749013; Colibri obteve MRR@10=0.696611 e nDCG@10=0.725809."
    - "As falhas opcionais publicadas eram genericamente classificadas porque o parent runner ignorava o payload estruturado em processos com exit code 2."
    - "A atividade não deve avançar ao Gate 3 antes de diagnosticar e tentar concluir Voyage Nano e os dois BitNet, solicitados explicitamente."
  decision: "PENDING"

blockers: []

next:
  action: "Sincronizar o patch 1.2.2, executar compilação e suíte completa e reexecutar somente voyage4_nano, bitnet_270m e bitnet_06b com --models. Preservar os quatro resultados obrigatórios e confirmar que o PASS canônico permanece inalterado. Usar os erros estruturados reais para corrigir incompatibilidades dentro do escopo e repetir os opcionais sem interromper os modelos seguintes."
  role: "local"
