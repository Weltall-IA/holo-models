schema_version: 1

task:
  id: "EMBED-BENCH-V3-1.2"
  title: "Benchmark de embeddings e reranking — Gate 2"
  objective: "Executar e comparar os modelos locais compactos no corpus congelado, priorizando candidatos específicos para PT-BR e baselines multilíngues, com falhas isoladas e resultados reproduzíveis."

scope:
  included:
    - "Gate 2 com modelos obrigatórios selecionados para comparação em PT-BR e benchmark local."
    - "Colibri PT-BR, Multilingual E5 Large Instruct, Qwen3 Embedding 0.6B e BGE-M3 denso como conjunto obrigatório."
    - "Voyage Nano e dois BitNet como candidatos opcionais."
    - "Processo isolado por modelo para impedir corrupção CUDA em cascata."
    - "Fixação da versão de Transformers comprovadamente compatível com Voyage Nano."
  excluded:
    - "Gates 3 a 6."
    - "API paga da Voyage AI."
    - "Reranking."
    - "Regeneração do corpus congelado."
    - "Merge, deploy ou publicação de modelos."

execution:
  stage: "1.2.3"
  role: "remote_author"
  state: "CORRECTED"

return:
  title: "Fixação reproduzível do Transformers e encerramento técnico do Gate 2"

changes:
  files_changed:
    - "benchmark/embedding-v3/requirements-gate2.txt"
    - "benchmark/embedding-v3/requirements-full.txt"
    - ".ai/tasks/EMBED-BENCH-V3-1.2/STATUS.yml"
  summary:
    - "O commit 455f20ca114b3946a1ca56db57afa2b8f8485971 foi auditado."
    - "O Gate 2 canônico permanece PASS com quatro modelos obrigatórios concluídos no corpus completo e hash congelado preservado."
    - "Voyage Nano concluiu com HR@1=0,693333, MRR@10=0,752757, nDCG@10=0,771872 e menor taxa de erro de negativos difíceis entre os candidatos executados."
    - "O peso do Voyage foi registrado na revisão 67fabc9bef010dabc5f6024aa1b1b6b93410426f, SHA-256 3dae0c63c81dcab79ac213af331940a1bf2b8a53ec8646be878552890291ad30."
    - "As duas falhas BitNet são incompatibilidades dos GGUF oficiais com o llama.cpp 9972: os arquivos usam TYPE_IQ4_NL_4_4, removido em favor de IQ4_NL com repacking em runtime."
    - "Os BitNet foram efetivamente testados; a falha não pertence ao benchmark e permanece documentada como bloqueio upstream dos artefatos."
    - "A execução local precisou de transformers 4.57.6, mas o requisito versionado aceitava versões posteriores incompatíveis. O patch fixa transformers==4.57.6."
    - "O registro de arquivos alterados do patch 1.2.2 foi normalizado: os quatro artefatos canônicos foram preservados e não integraram o diff publicado."

validations:
