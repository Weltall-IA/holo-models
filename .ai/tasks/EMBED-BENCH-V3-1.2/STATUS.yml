schema_version: 1

task:
  id: "EMBED-BENCH-V3-1.2"
  title: "Benchmark de embeddings e reranking — Gate 2"
  objective: "Executar e comparar os modelos locais compactos no corpus congelado, com revisões fixadas, métricas reproduzíveis e evidências sanitizadas."

scope:
  included:
    - "Gate 2 com os modelos locais habilitados em benchmark/embedding-v3/config/models.json."
    - "Resolução de revisão, tamanho, licença e estado de acesso antes do download."
    - "Download no diretório canônico embed/<model-id>, fora do Git."
    - "Embeddings locais sequenciais no corpus completo congelado."
    - "Métricas globais, por tipo de consulta e por consulta."
    - "Registro de backend, dimensão, dtype, normalização, throughput, VRAM e hashes dos pesos."
    - "Python 3.12 em ambiente virtual isolado e CUDA quando disponível."
  excluded:
    - "Gates 3 a 6."
    - "Modelos GGUF do Gate 3."
    - "Chamadas à API paga da Voyage AI."
    - "Reranking."
    - "Alteração ou regeneração do corpus congelado."
    - "Integração ao Holo, merge, deploy ou publicação de modelos."

execution:
  stage: "1.2.0"
  role: "remote_author"
  state: "EXECUTED"

return:
  title: "Implementação do Gate 2 para modelos locais compactos"

changes:
  files_changed:
    - "benchmark/embedding-v3/holo_benchmark/metrics.py"
    - "benchmark/embedding-v3/holo_benchmark/gate2.py"
    - "benchmark/embedding-v3/tests/test_metrics.py"
    - "benchmark/embedding-v3/tests/test_gate2.py"
    - "benchmark/embedding-v3/benchmark.py"
    - "benchmark/embedding-v3/requirements-gate2.txt"
