    - "Corpus completo: 600 documentos e 150 consultas."
    - "Hash do corpus: 8e1b7a6dd6f51d98e1ffe1738b6a59498df24c49b2edca24850b838687dd149b."
    - "Voyage Nano concluído em CUDA com dimensão 1024 e peso hashado."
