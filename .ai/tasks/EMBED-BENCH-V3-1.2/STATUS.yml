schema_version: 1

task:
  id: "EMBED-BENCH-V3-1.2"
  title: "Benchmark de embeddings e reranking — Gate 2"
  objective: "Executar e comparar modelos locais compactos no corpus congelado, priorizando evidência nativa em PT-BR, com falhas isoladas e resultados reproduzíveis."

scope:
  included:
    - "Gate 2 com modelos obrigatórios selecionados por evidência em PT-BR e benchmark local."
    - "Colibri PT-BR, Multilingual E5 Large Instruct, Qwen3 Embedding 0.6B e BGE-M3 denso como conjunto obrigatório."
    - "Voyage Nano e dois BitNet como candidatos opcionais."
    - "BitNet executado por llama.cpp usando arquivos GGUF específicos."
    - "Processo isolado por modelo para impedir corrupção CUDA em cascata."
    - "Revisão, licença, tamanho, acesso, backend, dimensão, dtype, throughput, VRAM e hashes."
    - "Python 3.12, CUDA e llama.cpp local quando disponível."
  excluded:
    - "Gates 3 a 6."
    - "API paga da Voyage AI."
    - "Reranking."
    - "Regeneração do corpus congelado."
    - "Merge, deploy ou publicação de modelos."

execution:
  stage: "1.2.1"
  role: "remote_author"
  state: "CORRECTED"

return:
  title: "Correção do Gate 2 com isolamento de processos e seleção PT-BR"

changes:
  files_changed:
    - "benchmark/embedding-v3/holo_benchmark/gate2.py"
    - "benchmark/embedding-v3/holo_benchmark/gate2_runtime.py"
    - "benchmark/embedding-v3/holo_benchmark/gate2_worker.py"
    - "benchmark/embedding-v3/tests/test_gate2.py"
    - "benchmark/embedding-v3/config/models.json"
    - "benchmark/embedding-v3/config/prompts.json"
