schema_version: 1

task:
  id: "EMBED-BENCH-V3-1.4"
  title: "Inventário completo e cobertura de todos os modelos locais"
  objective: "Descobrir todos os modelos locais atuais, eliminar omissões silenciosas, validar funcionamento por categoria e executar o benchmark de recuperação em todo modelo de embeddings elegível."

scope:
  included:
    - "Inventário automático de modelos em embed, text, audio, video, image e standalone."
    - "Inventário do Ollama, caches Hugging Face, diretórios do LM Studio e raízes adicionais."
    - "Benchmark completo para embeddings atuais e health checks reais para as demais categorias."
    - "Execução direta de GGUFs de texto pelo llama.cpp, mesmo quando não registrados no Ollama."
    - "Endpoint próprio de embeddings no Ollama."
    - "Adaptadores versionados para áudio, imagem e vídeo."
    - "Evidências estruturadas para sucesso, alias, legado e bloqueio."
  excluded:
    - "Download de modelos antigos apenas para ampliar o inventário."
    - "API paga."
    - "Regeneração do corpus."
    - "Merge, deploy ou publicação de modelos."

execution:
  stage: "1.4.1"
  role: "remote_author"
  state: "CORRECTED"

return:
  title: "Correção da falsa conclusão da cobertura total"

changes:
  files_changed:
    - "benchmark/embedding-v3/holo_benchmark/coverage_validation.py"
    - "benchmark/embedding-v3/validate_coverage.py"
