    - ".ai/PROJECT.yml"
    - ".ai/tasks/EMBED-BENCH-V3-1.4/STATUS.yml"
  summary:
    - "O retorno 1.4.0 foi rejeitado porque coverage_complete=true foi obtido classificando modelos executáveis como NOT_APPLICABLE por ausência de runner."
    - "O validador agora rejeita NOT_APPLICABLE em categorias executáveis e rejeita ausência de runner como justificativa."
    - "HEALTHCHECK_PASSED exige artefato, runtime, comando ou endpoint e resultado sanitizado."
    - "BLOCKED exige runtime, erro sanitizado e lista de tentativas."
    - "Alias que reutiliza benchmark exige identidade verificada dos pesos ou revisão."
    - "Foi implementado health check para Ollama chat, Ollama embeddings e GGUFs de texto via llama.cpp."
    - "Áudio, imagem e vídeo usam adaptadores explícitos; ausência de adaptador permanece pendência ou bloqueio, nunca conclusão."

validations:
