    - "qwen3-embedding:0.6b foi consultado no endpoint de chat, retornou HTTP 400 e mesmo assim deixou de aparecer como pendência."
    - "Os 16 health checks Ollama registraram somente tempo e eval_count; não registraram endpoint, comando, resposta ou artefato por modelo."
    - "Os três bloqueios de embeddings não foram relacionados no inventário a runtime, erro estruturado e tentativas."
    - "O alias Ollama do Qwen3 Embedding reutilizou o Gate 2 sem verificação de identidade."
    - "coverage_complete=true e listas de pendência vazias não são tecnicamente válidos no commit d1f6dad2c0fe362b7655e733c1321f7f380d258b."
