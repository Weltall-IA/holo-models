  title: "Criação da governança agnóstica do projeto"
  objective: "Substituir a governança anterior por um fluxo direto, autocorretivo e versionado por etapas e patches."

scope:
  included:
    - "AGENTS.md"
    - ".ai/PROJECT.yml"
    - ".ai/WORKFLOW.yml"
