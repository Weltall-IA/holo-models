schema_version: 1

task:
  id: "RERANK-BENCH-V1-1.5"
  title: "Benchmark decisório de embeddings e rerankers para busca de cenas"
  objective: "Comparar cinco variantes de embedding sem reranker, com Qwen local e com Voyage rerank-2.5."

scope:
  included:
    - "Corpus congelado com 600 documentos e 150 consultas."
    - "EmbeddingGemma 768 float32."
    - "Voyage 4 Nano em 1024 float32, 2048 float32 e 2048 int8."
    - "Voyage 4 Large 1024 float32 reutilizado dos checkpoints existentes."
    - "Qwen reranker local."
    - "Voyage rerank-2.5 como referência externa autorizada."
    - "Top 50 candidatos e reranking principal do top 20."
  excluded:
    - "Voyage Context 4."
    - "Regeneração do corpus."
    - "Nova chamada de embedding Voyage 4 Large."
    - "Integração, merge ou implantação."

execution:
  stage: "1.5.2"
  role: "remote_author"
  state: "CORRECTED"

return:
  title: "Correção da completude do benchmark decisório de embeddings e rerankers"

changes:
  files_changed:
    - ".ai/tasks/RERANK-BENCH-V1-1.5/STATUS.yml"
    - "benchmark/embedding-v3/holo_benchmark/reranker_metrics.py"
    - "benchmark/embedding-v3/reranker_report.py"
    - "benchmark/embedding-v3/tests/test_reranker.py"
  summary:
    - "O commit local 05942ac6a036dd0c5a5ec95f773b0a721962e72e produziu dez pipelines válidos: cinco baselines e cinco pipelines com Qwen local."
    - "A auditoria encontrou que o gerador marcava summary.json como PASS incondicionalmente, apesar de cinco pipelines Voyage rerank-2.5 estarem ausentes."
    - "O patch 1.5.2 calcula a matriz esperada, registra pipelines concluídas, ausentes, inesperadas e duplicadas e só retorna PASS quando as quinze existem."
    - "Com os artefatos atuais, o resultado correto após regeneração será PARTIAL, com dez de quinze pipelines."
    - "A liderança do EmbeddingGemma com Qwen é apenas numérica entre as pipelines concluídas; não representa qualidade absoluta nem significância estatística."
    - "A variante Nano 2048 int8 é uma quantização escalar calibrada no corpus e avaliada por cosseno após desquantização; latência nativa de banco vetorial int8 não foi medida."
    - "O Qwen3-Reranker-0.6B foi executado corretamente pela interface CrossEncoder da biblioteca local, usando o checkpoint CausalLM como reranker generativo."

validations:
  executed:
    - "Inspeção do commit local e dos dez artefatos de pipeline."
    - "Conferência do relatório, preflight, score do Qwen, hashes, recursos e métricas."
    - "Revisão do cálculo de rescue rate, damage rate e cobertura de candidatos."
    - "Revisão dos diffs do patch 1.5.2 e inclusão de testes para matriz parcial e completa."
  passed:
    - "Os dez resultados concluídos são consistentes com os artefatos versionados."
    - "Qwen3-Reranker-0.6B: peso 1191588280 bytes, SHA-256 27cd75a405b9c1b46b59abfd88aaa209e6fed2a1972cde9b70e7659537c5e65b."
    - "EmbeddingGemma + Qwen lidera numericamente as pipelines concluídas com MRR@10 0.791074 e nDCG@10 0.805547."
    - "Voyage Large + Qwen está praticamente empatado: MRR@10 0.790296 e nDCG@10 0.804706."
    - "Corpus SHA-256 congelado foi preservado."
  failed:
    - "O summary.json publicado está incorretamente marcado como PASS antes da regeneração pelo runner corrigido."
  unavailable:
    - "A suíte completa e a regeneração dos artefatos dependem do host local."
    - "A causa exata do bloqueio Voyage rerank-2.5 não possui artefato estruturado versionado; apenas o registro sanitizado no retorno local e no STATUS anterior."

audit:
  findings:
    - "Dez pipelines locais aprovadas como resultados parciais."
    - "Cinco pipelines Voyage rerank-2.5 continuam ausentes."
    - "Não é válido declarar melhor qualidade absoluta enquanto a referência Voyage não tiver sido executada."
    - "A diferença entre EmbeddingGemma + Qwen e Voyage Large + Qwen é 0.000778 em MRR@10 e 0.000841 em nDCG@10, sem teste de significância."
  decision: "CORRECTION_REQUIRED"

blockers:
  - "Regenerar summary.json e RERANKER_PIPELINE_REPORT.md com o runner 1.5.2, sem reexecutar embeddings ou Qwen."
  - "Executar a suíte local; o total esperado passa de 71 para 73 testes."
  - "Voyage rerank-2.5 permanece pendente para concluir as quinze pipelines."

next:
  action: "Sincronizar o patch 1.5.2, regenerar somente o relatório, validar e publicar os artefatos corrigidos."
  role: "local"
