    - "Foi criado um transporte pela Batch API oficial, próprio para avaliações assíncronas e compatível com rerank-2.5."
    - "O job Batch preserva as mesmas 150 consultas, a mesma instrução e a mesma união top-20 usada pelo Qwen."
    - "Embeddings, candidatos e Qwen não são reexecutados."
    - "Entrada, estado, saída e erros do Batch permanecem em results/raw/reranker/voyage_batch e fora do Git."
    - "A execução é retomável por input_file_id e batch_id sem reenviar um job já criado."

