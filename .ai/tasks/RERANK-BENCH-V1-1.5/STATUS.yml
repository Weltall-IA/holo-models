  title: "Benchmark decisório de embeddings e rerankers para busca de cenas"
  objective: "Comparar cinco variantes de embedding sem reranker, com Qwen local e com Voyage rerank-2.5."

scope:
  included:
    - "Corpus congelado com 600 documentos e 150 consultas."
    - "EmbeddingGemma 768 float32."
    - "Voyage 4 Nano em 1024 float32, 2048 float32 e 2048 int8."
    - "Voyage 4 Large 1024 float32 reutilizado dos checkpoints existentes."
    - "Qwen reranker local."
    - "Voyage rerank-2.5 como referência externa autorizada."
    - "Top 50 candidatos e reranking principal do top 20."
  excluded:
    - "Voyage Context 4."
    - "Regeneração do corpus."
    - "Nova chamada de embedding Voyage 4 Large."
    - "Integração, merge ou implantação."

