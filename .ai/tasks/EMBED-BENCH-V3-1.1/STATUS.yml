schema_version: 1

task:
  id: "EMBED-BENCH-V3-1.1"
  title: "Benchmark de embeddings e reranking — Gates 0 e 1"
  objective: "Validar o ambiente local e gerar, revisar e congelar o corpus fictício antes de baixar ou executar modelos."

scope:
  included:
    - "Testes do benchmark."
    - "Gate 0 com inventário real do ambiente e validação CUDA pelo PyTorch."
    - "Gate 1 com geração, revisão semântica e congelamento do corpus."
    - "Python 3.12 em ambiente virtual isolado."
    - "Artefatos e evidências dos Gates 0 e 1."
  excluded:
    - "Python 3.14."
    - "Gates 2 a 6."
    - "Download ou carregamento de modelos de embedding."
    - "Geração de embeddings."
    - "Chamadas à Voyage AI."
    - "Alteração de drivers, CUDA do sistema, Ollama ou serviços."
    - "Integração ao Holo, merge ou publicação de modelos."

execution:
  stage: "1.1.1"
  role: "remote_author"
  state: "CORRECTED"

return:
  title: "Correção da validação CUDA do Gate 0 com PyTorch"

changes:
  files_changed:
    - "benchmark/embedding-v3/requirements-gate01.txt"
    - ".ai/PROJECT.yml"
    - ".ai/tasks/EMBED-BENCH-V3-1.1/STATUS.yml"
  summary:
    - "O retorno 1.1.0 foi rejeitado para o Gate 0 porque PyTorch e a alocação CUDA mínima não foram executados."
    - "PyTorch foi incluído nas dependências mínimas dos Gates 0 e 1."
    - "O comando de instalação das dependências mínimas foi registrado em PROJECT.yml."
    - "Os resultados do Gate 1 permanecem preservados: 30 obras, 600 chunks, 150 consultas, 35 itens revisados e SHA-256 conjunto 8e1b7a6dd6f51d98e1ffe1738b6a59498df24c49b2edca24850b838687dd149b."
    - "Nenhum checkpoint foi baixado, nenhuma chamada à Voyage foi feita e nenhum embedding foi executado."

validations:
  executed:
    - "Revisão do retorno local 1.1.0."
    - "Comparação do resultado do Gate 0 com o requisito de validação CUDA pelo PyTorch."
    - "Revisão das dependências mínimas e dos comandos do projeto."
  passed:
    - "Gate 1 e o corpus congelado não foram afetados pela correção."
    - "A dependência torch foi adicionada ao requirements-gate01.txt."
    - "PROJECT.yml passou a registrar a instalação das dependências mínimas."
  failed:
    - "Gate 0 do retorno 1.1.0: PyTorch não estava instalado, torch.cuda.is_available() não foi validado e a alocação CUDA mínima não foi executada."
  unavailable:
    - "A instalação do PyTorch e a nova execução CUDA dependem do ambiente local."

audit:
  findings:
    - "Um Gate 0 não pode ser aprovado em uma máquina NVIDIA quando a validação CUDA pelo PyTorch e a alocação mínima não foram executadas."
  decision: "REJECTED"

blockers: []

next:
  action: "Sincronizar a correção 1.1.1, instalar as dependências mínimas atualizadas no ambiente virtual Python 3.12 e repetir os testes e o Gate 0. O Gate 1 não precisa ser regenerado se seus hashes permanecerem inalterados."
  role: "local"
