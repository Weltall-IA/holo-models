schema_version: 1

project:
  name: "holo-models"
  repository: "Weltall-IA/holo-models"
  description: "Inventário, configuração, operação, benchmark reproduzível e avaliação de modelos locais do Projeto Holo."
  default_branch: "master"

technology:
  languages:
    - "Python"
    - "YAML"
    - "JSON"
    - "Markdown"
  frameworks: []
  package_managers:
    - "pip"
  runtimes:
    - "Python"
    - "Ollama"
    - "llama.cpp"
  infrastructure:
    - "GitHub"
    - "NVIDIA CUDA"
    - "bcachefs"

paths:
  governance:
    - "AGENTS.md"
    - ".ai/PROJECT.yml"
    - ".ai/WORKFLOW.yml"
    - ".ai/templates"
    - ".ai/tasks"
  domain_documentation:
    - "docs/model-governance/MODEL_STORAGE.md"
  model_categories:
    text: "text"
    audio: "audio"
    video: "video"
    image: "image"
    embeddings_and_rerankers: "embed"
  inventories:
    - "LISTA_MODELOS.md"
    - "LISTA_BLACKLIST.md"
  source:
    - "benchmark/embedding-v3/holo_benchmark"
    - "benchmark/embedding-v3/benchmark.py"
    - "benchmark/embedding-v3/reranker_execution.py"
    - "benchmark/embedding-v3/reranker_report.py"
  tests:
    - "benchmark/embedding-v3/tests"
  documentation:
    - "README.md"
    - "docs"
    - "benchmark/embedding-v3/RERANKER_BENCHMARK.md"
  configuration:
    - ".ai"
    - "benchmark/embedding-v3/config"
    - "benchmark/embedding-v3/requirements-gate01.txt"
    - "benchmark/embedding-v3/requirements-gate2.txt"
    - "benchmark/embedding-v3/requirements-gate3.txt"
    - "benchmark/embedding-v3/requirements-full.txt"
    - "benchmark/embedding-v3/requirements-voyage.txt"
    - "benchmark/embedding-v3/requirements-reranker.txt"
  scripts:
    - "benchmark/embedding-v3/benchmark.py"
    - "benchmark/embedding-v3/inventory_local.py"
    - "benchmark/embedding-v3/healthcheck_local.py"
    - "benchmark/embedding-v3/validate_coverage.py"
    - "benchmark/embedding-v3/voyage_benchmark.py"
    - "benchmark/embedding-v3/reranker_benchmark.py"
  generated:
    - "benchmark/embedding-v3/environment.json"
    - "benchmark/embedding-v3/system_info.json"
    - "benchmark/embedding-v3/requirements-resolved.txt"
    - "benchmark/embedding-v3/GATE_0_REPORT.md"
    - "benchmark/embedding-v3/GATE_1_REPORT.md"
    - "benchmark/embedding-v3/GATE_2_REPORT.md"
    - "benchmark/embedding-v3/GATE_3_REPORT.md"
    - "benchmark/embedding-v3/DIRECTOR_BRIEF.md"
    - "benchmark/embedding-v3/gate_status.json"
    - "benchmark/embedding-v3/download_manifest.resolved.json"
    - "benchmark/embedding-v3/download_manifest_gate3.resolved.json"
    - "benchmark/embedding-v3/results/gate2"
    - "benchmark/embedding-v3/results/gate3"
    - "benchmark/embedding-v3/results/voyage"
    - "benchmark/embedding-v3/results/reranker"
    - "benchmark/embedding-v3/RERANKER_PIPELINE_REPORT.md"
    - "benchmark/embedding-v3/results/local_healthchecks.json"
    - "benchmark/embedding-v3/local_model_inventory.json"
    - "benchmark/embedding-v3/LOCAL_MODEL_INVENTORY_REPORT.md"
    - "benchmark/embedding-v3/data/holo_fake_scenes_v3"
  sensitive:
    - ".env"
    - ".env.*"
    - "**/secrets"
    - "**/credentials"
    - "**/private_key*"
    - "*.key"
    - "*.pem"
    - "model weights"
    - "local caches"
    - "databases"
    - "tokens"
    - ".voyage4_token"

commands:
  governance_validation:
    - "python .ai/validate_governance.py"
    - "git diff --check"
  setup:
    - "<python-interpreter> -m pip install -r benchmark/embedding-v3/requirements-gate01.txt"
    - "<python-interpreter> -m pip install -r benchmark/embedding-v3/requirements-gate2.txt"
    - "<python-interpreter> -m pip install -r benchmark/embedding-v3/requirements-gate3.txt"
    - "<python-interpreter> -m pip install -r benchmark/embedding-v3/requirements-voyage.txt"
    - "<python-interpreter> -m pip install -r benchmark/embedding-v3/requirements-reranker.txt"
  test:
    - "<python-interpreter> -m unittest discover -s benchmark/embedding-v3/tests -v"
  validate:
    - "<python-interpreter> -m compileall -q benchmark/embedding-v3"
    - "<python-interpreter> benchmark/embedding-v3/validate_coverage.py"
    - "<python-interpreter> benchmark/embedding-v3/reranker_benchmark.py --phase preflight"

constraints:
  repository:
    - "Pesos, caches, bancos, tokens, chaves e credenciais nunca são versionados."
    - "Cada modelo permanece em uma única categoria canônica; metadados registram categorias adicionais sem duplicar pesos."
    - "Arquivos gerados só são atualizados por execução real do gerador correspondente."
    - "Resultados, versões, métricas e hashes só são registrados quando realmente obtidos."
    - "As regras técnicas de armazenamento e operação de modelos estão em docs/model-governance/MODEL_STORAGE.md."
  sensitive_changes:
    - "LISTA_MODELOS.md"
    - "LISTA_BLACKLIST.md"
    - "catálogos, taxonomias e regras de domínio"
    - "manifests e arquivos gerados sensíveis"
    - "governança, segurança, permissões e controle de acesso"
    - "operações em runtimes, serviços ou armazenamento externo"
  model_operations:
    - "Use o runtime compatível com o formato do modelo; não presuma Ollama, llama.cpp, Transformers ou outro fornecedor."
    - "Antes de importar, mover ou remover pesos, resolva a origem, o destino, as referências e a possibilidade de recuperação."
    - "Remoção de modelos, manifests ou blobs é ação destrutiva e exige aprovação humana explícita."
    - "Reflink só pode ser usado após confirmar o mesmo filesystem, a identidade do blob, o modo obrigatório sem fallback e a substituição atômica."
    - "Chamadas pagas, publicação externa, deploy e mudanças de conta exigem aprovação humana explícita."
  benchmark:
    - "Não alterar corpus congelado do benchmark para favorecer um modelo."
    - "Não executar gate posterior nem chamar API paga sem autorização explícita."
    - "Voyage usa VOYAGE_API_KEY_PATH apontando para .voyage4_token ignorado pelo Git; nunca registrar seu conteúdo."
    - "Gate 2 deve resolver e registrar revisão, licença, tamanho e hashes antes de concluir cada modelo."
    - "Gate 3 deve registrar versão do llama.cpp, arquivo GGUF exato, quantização, pooling, dimensões nativa e avaliada, throughput, pico de VRAM e hashes."
    - "Gate 3 só pode concluir PASS em CUDA, no corpus completo e com todos os modelos obrigatórios."
    - "Resultados de benchmark devem identificar modelo, revisão, backend, dimensão, dtype, normalização e hardware."
    - "Ausência de runner é pendência de implementação ou bloqueio comprovado; nunca NOT_APPLICABLE."
    - "HEALTHCHECK_PASSED exige artefato, runtime, comando ou endpoint e resultado sanitizado."
    - "BLOCKED exige runtime, erro sanitizado e tentativas registradas."
    - "Alias de modelo só reutiliza benchmark quando a identidade dos pesos ou revisão for verificada."
    - "A cobertura local só pode concluir quando validate_coverage.py retornar código 0."
    - "Benchmark de rerankers preserva top 50 candidatos e reranqueia top 20 com a mesma instrução e os mesmos textos."
    - "Voyage 4 Large deve reutilizar checkpoints existentes; o runner não pode chamar implicitamente a API de embedding."
    - "Voyage rerank-2.5 só pode executar com a flag --allow-voyage-rerank-api após autorização humana explícita."

environment:
  required_tools:
    - "git"
  optional_tools:
    - "nvidia-smi"
    - "nvcc"
    - "Ollama"
    - "llama.cpp"
  required_variables: []
